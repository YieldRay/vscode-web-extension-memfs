<!doctype html>
<html>
  <head>
    <script>
      performance.mark("code/didStartRenderer");
    </script>
    <meta charset="utf-8" />

    <!-- Mobile tweaks -->
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="Code" />
    <link rel="apple-touch-icon" href="https://raw.esm.sh/code-oss@1.119.0/code-192.png" />

    <!-- Disable pinch zooming -->
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, user-scalable=no"
    />

    <!-- Workbench Icon/Manifest/CSS -->
    <link rel="icon" href="https://raw.esm.sh/code-oss@1.119.0/favicon.ico" type="image/x-icon" />
    <link
      rel="stylesheet"
      href="https://raw.esm.sh/code-oss@1.119.0/out/vs/workbench/workbench.web.main.internal.css"
    />
  </head>

  <body aria-label=""></body>

  <!-- Startup (do not modify order of script tags!) -->
  <script>
    const baseUrl = new URL("https://raw.esm.sh/code-oss@1.119.0/out/", window.location.href);
    globalThis._VSCODE_FILE_ROOT = baseUrl.origin + baseUrl.pathname;

    // Allow scripts from the CDN origin to pass VS Code's Trusted Types check.
    // Without this, dynamic script loads (e.g. xterm.js for the terminal) are
    // blocked because they don't match window.location.origin.
    const cdnOrigin = new URL(baseUrl).origin;
    if (window.trustedTypes) {
      globalThis._VSCODE_WEB_PACKAGE_TTP = window.trustedTypes.createPolicy("amdLoader", {
        createScriptURL(value) {
          if (value.startsWith(window.location.origin) || value.startsWith(cdnOrigin)) {
            return value;
          }
          throw new Error(`[trusted_script_src] Invalid script url: ${value}`);
        },
      });
    }
  </script>
  <script>
    performance.mark("code/willLoadWorkbenchMain");
  </script>
  <!-- always ensure built in english NLS messages -->
  <script type="module" src="https://raw.esm.sh/code-oss@1.119.0/out/nls.messages.js"></script>
  <!-- attempt to load NLS messages in case non-english -->
  <script type="module" src="https://raw.esm.sh/code-oss@1.119.0/out/nls.messages.js"></script>
  <script type="module">
    import init from "https://raw.esm.sh/code-oss@1.119.0/workbench.js";
    import * as almostnode from "https://esm.sh/almostnode@0.2";

    globalThis.almostnode = almostnode;

    // Queue for server-ready events; drained by the extension after each command.
    globalThis._pendingServers = [];

    init(document.body, {
      commands: [
        {
          id: "host.eval",
          handler: async (code) => {
            return await eval(code);
          },
        },
        {
          id: "host.promise",
          handler: async (code) => {
            try {
              const value = await eval(code);
              return { status: "fulfilled", value };
            } catch (reason) {
              return { status: "rejected", reason };
            }
          },
        },
      ],
      productConfiguration: {
        extensionsGallery: {
          serviceUrl: "https://open-vsx.org/vscode/gallery",
          itemUrl: "https://open-vsx.org/vscode/item",
          resourceUrlTemplate: "https://openvsxorg.blob.core.windows.net/resources/{publisher}/{name}/{version}/{path}",
        },
        extensionEnabledApiProposals: {},
        webEndpointUrlTemplate: "https://raw.esm.sh/code-oss@1.119.0",
        quality: "stable",
      },
      folderUri: {
        scheme: "memfs",
        authority: location.host,
        query: "",
        path: "/",
      },
      additionalBuiltinExtensions: [
        {
          scheme: location.protocol.replace(":", ""),
          authority: location.host,
          path: new URL("extension/dist", location.href).pathname,
        },
      ],
    });
  </script>
</html>
